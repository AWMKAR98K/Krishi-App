  function checkLogin(targetPage) {
    // Check if the user is signed in (you can customize this logic)
    const isSignedIn = localStorage.getItem('signedIn');

    if (isSignedIn === 'true') {
      // User is signed in — go directly to the target page
      window.location.href = targetPage;
    } else {
      // Not signed in — save the target page and go to signup
      localStorage.setItem('redirectAfterSignup', targetPage);
      window.location.href = 'login.html';
    }
  }

function checkLogins(targetPage) {

  function updateUIByLanguage(lang) {
    const t = translations[lang];
    if (!t) return;

    document.querySelector('header h1').innerText = t.title;
    document.querySelectorAll('#features button')[0].innerText = t.feature1;
    document.querySelectorAll('#features button')[1].innerText = t.feature2;
    document.querySelectorAll('#features button')[2].innerText = t.feature3;
    document.querySelectorAll('#features button')[3].innerText = t.feature4;
    document.querySelectorAll('#features button')[4].innerText = t.feature5;
    document.querySelectorAll('#features button')[5].innerText = t.feature6;
    document.querySelectorAll('#features button')[6].innerText = t.feature7;
    document.querySelector('#voiceOrText button').innerText = t.voiceInput;
    document.querySelector('#textInput').placeholder = t.inputPlaceholder;
    document.querySelectorAll('#voiceOrText button')[1].innerText = t.submit;
  }

  document.getElementById('languageSelector').addEventListener('change', function () {
    updateUIByLanguage(this.value);
  });

  updateUIByLanguage(document.getElementById('languageSelector').value);

  function startVoiceRecognition() {
    const lang = document.getElementById('languageSelector').value;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = lang;
    recognition.start();

    recognition.onresult = function (event) {
      const text = event.results[0][0].transcript;
      document.getElementById('textInput').value = text;
      processVoiceCommand(text);
    };

    recognition.onerror = function (event) {
      alert('Voice error: ' + event.error);
    };
  }

  function processText() {
    const text = document.getElementById('textInput').value;
    processVoiceCommand(text);
  }

  function speak(text, langCode) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = langCode;
    const voices = speechSynthesis.getVoices();
    const voice = voices.find(v => v.lang === langCode);
    if (voice) utterance.voice = voice;
    speechSynthesis.speak(utterance);
  }

  function processVoiceCommand(text) {
    const lowerText = text.toLowerCase();
    let message = '';
    const lang = document.getElementById('languageSelector').value;
      
      if (lowerText.includes("ಭೂಮಿಯ") || lowerText.includes("ಸಲಹೆ") || lowerText.includes("ಮಾಹಿತಿ") || lowerText.includes("ഭൂമി")) {
      message = translations[lang].feature1;
      location.href='1.html';
    } else if (lowerText.includes("animal") || lowerText.includes("પશુપાલન") || lowerText.includes("बेचना") || lowerText.includes("விற்க")) {
      message = translations[lang].feature2;
      location.href='2.html';
    } else if (lowerText.includes("crop") || lowerText.includes("quintal") || lowerText.includes("बेचना") || lowerText.includes("விற்க")) {
      message = translations[lang].feature3;
      location.href='https://scan-crop-ai-tyit.streamlit.app/';
    } else if (lowerText.includes("sell") ||  lowerText.includes("বিক্রি") || lowerText.includes("products") || lowerText.includes("बेचना") || lowerText.includes("விற்க")|| lowerText.includes("शेत काम")  ) {
      message = translations[lang].feature4;
      location.href='wholesaler.html';
    } else if (lowerText.includes("soil") || lowerText.includes("test") || lowerText.includes("चाचणी")) {
      message = translations[lang].feature5;
      location.href='5.html';
    } else if (lowerText.includes("seeds") || lowerText.includes("खरीद") || lowerText.includes("விதைகள்") ) {
      message = translations[lang].feature6;
      location.href='farmer.html';
    } else if (lowerText.includes("government") || lowerText.includes("scheme") || lowerText.includes("सरकारी योजनाएं")||lowerText.includes("அரசு")) {
      message = translations[lang].feature7;
      location.href='7.html';
    } else {
      message = (lang === 'hi-IN') ? "माफ करें, मैं समझ नहीं पाया।" :
                (lang === 'ta-IN') ? "மன்னிக்கவும், புரியவில்லை." :
                "Sorry, I didn’t understand.";
    }

    document.getElementById('response').innerText = message;
    speak(message, lang);
  }
