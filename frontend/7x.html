    <title data-i18n="title">District & Taluka Selector</title>

    <style>
        /* Optional: Custom styles for a better look */
        body {

<header>
    <div id="menu-placeholder"></div>
    <script>
  fetch('menu.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('menu-placeholder').innerHTML = data;
    });
</script>
</header>

        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b pb-4">
            <label for="languageSelect" class="font-medium text-gray-700 mb-2 sm:mb-0" data-i18n="labelLanguage">Select Language:</label>
            <select id="languageSelect" class="p-2 rounded-lg text-gray-800 bg-white shadow-inner focus:ring-2 focus:ring-yellow-400" onchange="setLanguage(this.value)">
                <option value="en">English</option>
                <option value="mr">मराठी (Marathi)</option>
                <option value="hi">हिन्दी (Hindi)</option>
                <option value="ml">മലയാളം (Malayalam)</option>
                <option value="te">తెలుగు (Telugu)</option>
                <option value="kn">ಕನ್ನಡ (Kannada)</option>
                <option value="ta">தமிழ் (Tamil)</option>

        </div>

        <div class="flex items-center space-x-2 mb-8">
            <label id="labelTaluka" class="font-medium text-gray-700 whitespace-nowrap" data-i18n="labelTaluka">Select Taluka:</label>
            <select id="talukaSelect" class="p-2 w-full rounded-lg text-gray-800 bg-white shadow-inner focus:ring-2 focus:ring-yellow-400" onchange="searchAllAddresses()">
                </select>
        </div>

            <div class="mb-5">

        // --- 2. JAVASCRIPT LOGIC ---

        // Helper functions
        function getTranslations() {
            const langCode = document.getElementById('languageSelect').value;
            return translations[langCode] || translations['en'];
        }

        function getPlaceName(englishName, langCode) {
            const translations = placeNameTranslations[englishName];
            if (translations && translations[langCode]) {
                return translations[langCode];
            }
            // Fallback to English name if translation is missing
            return englishName;
        }

        // --- Core Functions ---

        function populateDistrictOptions() {
            const districtSelect = document.getElementById('districtSelect');
            const langCode = document.getElementById('languageSelect').value;
            const t = getTranslations();
            
            districtSelect.innerHTML = `<option value="" disabled selected>${t['placeholderDistrict']}</option>`;

            Object.keys(locationData).forEach(district => {
                const option = document.createElement('option');
                option.value = district; // Store English name as value for API search
                option.textContent = getPlaceName(district, langCode); // Display local name
                districtSelect.appendChild(option);
            });
            updateTalukaOptions();
        }

        function updateTalukaOptions() {
            const districtSelect = document.getElementById('districtSelect');
            const talukaSelect = document.getElementById('talukaSelect');
            const selectedDistrict = districtSelect.value; // English name is stored here
            const langCode = document.getElementById('languageSelect').value;
            const t = getTranslations();
            
            talukaSelect.innerHTML = `<option value="" disabled selected>${t['placeholderTaluka']}</option>`;
            
            if (selectedDistrict && locationData[selectedDistrict]) {
                document.getElementById('resultsContainer').classList.remove('hidden');
                locationData[selectedDistrict].forEach(taluka => {
                    const option = document.createElement('option');
                    option.value = taluka; // Store English name as value for API search
                    option.textContent = getPlaceName(taluka, langCode); // Display local name
                    talukaSelect.appendChild(option);
                });
            } else {
                 document.getElementById('resultsContainer').classList.add('hidden');
            }
        }

        function setLanguage(langCode) {
            const elements = document.querySelectorAll('[data-i18n]');
            const langDict = translations[langCode];
            
            if (!langDict) return;

            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (langDict[key] && typeof langDict[key] === 'string') {
                    el.textContent = langDict[key];
                }
            });

            // Update placeholders and dependent options (District/Taluka names)
            populateDistrictOptions();
            
            // Clear and reset result messages to the new language prompt
            clearResults();
        }

        function clearResults() {
             const t = getTranslations();
             document.getElementById('govAddress').innerHTML = `<span class="text-gray-500">${t.msgSelectPrompt}</span>`;
             document.getElementById('bankAddress').innerHTML = `<span class="text-gray-500">${t.msgSelectPrompt}</span>`;
        }


        // --- Search Functions ---

        /**
         * Fetches address data using pre-defined data or Nominatim API.
         */
        async function fetchAddress(type, district, taluka, queryTerm, addressElement) {
            const t = getTranslations();
            // Get local names for display in status messages
            const localTaluka = getPlaceName(taluka, document.getElementById('languageSelect').value);
            const localDistrict = getPlaceName(district, document.getElementById('languageSelect').value);
            
            // --- 1. Check Pre-defined Data for Government Offices ---
            if (type === 'Government Office') {
                const predefinedAddress = govOfficeAddresses[taluka];
                if (predefinedAddress) {
                    addressElement.innerText = `${t.msgFoundPredefined} ${predefinedAddress}`;
                    addressElement.classList.remove('animate-pulse');
                    return;
                }
            }


            // --- 2. Fallback to Nominatim API Fetch (for Banks and missing Gov Offices) ---
            // NOTE: We use English names for the API query for reliability.
            const q = `${queryTerm} in ${taluka}, ${district}`; 
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`;
            
            // Set loading state (translated) using local names
            addressElement.innerText = t.msgSearching(type, localTaluka, localDistrict);
            addressElement.classList.add('animate-pulse');

            try {
                const res = await fetch(url, { headers: { 'User-Agent': 'gov-app-v1' } });
                
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }

                const data = await res.json();

                if (!data || data.length === 0) {
                    // Handle no results found (translated) using local names
                    const notFoundMsg = (type === 'Bank') ? t.msgNotFoundBank(type, localTaluka, localDistrict) : t.msgNotFoundGov(type, localTaluka, localDistrict);
                    addressElement.innerText = notFoundMsg;
                } else {
                    // Success: display the address (address content remains in original language from API)
                    const address = data[0].display_name;
                    addressElement.innerText = `${t.msgFound} ${address}`;
                }
            } catch (error) {
                console.error("Error fetching address for", type, error);
                addressElement.innerText = t.msgFetchError;
            } finally {
                addressElement.classList.remove('animate-pulse');
            }
        }

        /**
         * Triggers the search for both Government Office and Bank addresses.
         */
        function searchAllAddresses() {
            const districtSelect = document.getElementById('districtSelect');
            const talukaSelect = document.getElementById('talukaSelect');
            const district = districtSelect.value; // English Key
            const taluka = talukaSelect.value;   // English Key

            if (!district || !taluka) {
                clearResults();
                return;
            }

            // 1. Search for Government Office
            const govAddressElement = document.getElementById('govAddress');
            fetchAddress('Government Office', district, taluka, 'Government Office', govAddressElement);

            // 2. Search for Bank
            const bankAddressElement = document.getElementById('bankAddress');
            fetchAddress('Bank', district, taluka, 'Bank', bankAddressElement);
        }

        // --- 3. INITIALIZATION ---

        document.addEventListener('DOMContentLoaded', () => {
            // Set the initial language to English
            document.getElementById('languageSelect').value = 'en';
            setLanguage('en'); 
            
            // Ensure search is triggered when Taluka changes
            document.getElementById('talukaSelect').addEventListener('change', searchAllAddresses);
        });

    </script>
