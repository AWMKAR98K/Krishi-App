<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>


/* Hide the checkbox */
input[type="checkbox"] {
  display: none;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Toggle Button */
.toggle {
  position: absolute;
  top: 20px;
  left: 15px;
  height: 30px;
  width: 30px;
  z-index: 2;
  cursor: pointer;
  background-color: #fff;
  border-radius: 2px;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
  position: relative;
  display: flex;
  justify-content: left;
  align-items: left;
}

/* Hamburger Lines */
.line {
  position: absolute;
  height: 2px;
  width: 20px;
  background-color: green;
  border-radius: 50px;
  left: 50%;
  transform: translateX(-50%);
  transition: 0.3s ease;
}

.top_line {
  top: 8px;
}

.middle_line {
  top: 14px;
}

.bottom_line {
  top: 20px;
}

/* Sidebar */
.slide {
  height: 600px;
  width: 170px;
  position: absolute;
  top: 0;
  left: 0;
  background-color: #fff;
  transform: translateX(-100%);
  transition: 0.5s ease;
  box-shadow: 0 0 0 rgba(0, 0, 0, 0);
  z-index: 1;
  text-align: left;
}

/* Show sidebar and cross icon on checkbox checked */
#toggle-checkbox:checked ~ .toggle .top_line {
  transform: translateX(-50%) rotate(45deg);
  top: 14px;
}

#toggle-checkbox:checked ~ .toggle .middle_line {
  opacity: 0;
}

#toggle-checkbox:checked ~ .toggle .bottom_line {
  transform: translateX(-50%) rotate(-45deg);
  top: 14px;
}

#toggle-checkbox:checked ~ .slide {
  transform: translateX(0);
  box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
}

/* Menu Heading */
.slide h2 {
  color: rgb(3, 206, 30);
  font-size: 45px;
  text-align: center;
  padding: 2px 15px;
  pointer-events: none;
}
@media (max-width: 764px) {
.slide h2 {
  color: rgb(3, 206, 30);
  padding-bottom: 60px;
  font-size: 30px;
  text-align: center;
  padding: 2px 15px;
  pointer-events: none;
}
}

/* Menu List */
ul li {
  list-style: none;
}

ul li a {
  color: black;
  text-align: left;
  font-size: 20px;
  font-weight: 200;
  padding: 10px 15px;
  display: flex;
  align-items: left;
  text-transform: capitalize;
  text-decoration: none;
  transition: 0.2s ease-out;
}

ul li a:hover {
    color: white;
  background-color: rgb(3, 206, 30);
}

ul li a img {
  border-radius: 50%;
  height: 30px;
  width: 30px;
  margin-right: 10px;
}
    </style>
</head>
<body>
    <input type="checkbox" id="toggle-checkbox">
<label for="toggle-checkbox" class="toggle">
  <span class="line top_line"></span>
  <span class="line middle_line"></span>
  <span class="line bottom_line"></span>
</label>

</div>
</body>
